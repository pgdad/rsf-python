rsf_version: "1.0"
Comment: "Parity test: S3 ETL pipeline"
StartAt: ReadFromS3

States:
  ReadFromS3:
    Type: Task
    Next: TransformRecords

  TransformRecords:
    Type: Map
    ItemsPath: "$.records"
    ItemProcessor:
      StartAt: TransformOne
      States:
        TransformOne:
          Type: Task
          End: true
    ResultPath: "$.records"
    Next: WriteETLResult

  WriteETLResult:
    Type: Task
    Next: Done

  Done:
    Type: Succeed
