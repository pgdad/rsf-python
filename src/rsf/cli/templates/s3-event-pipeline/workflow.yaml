rsf_version: "1.0"
Comment: "S3 event pipeline — process uploaded files with validation, transformation, and notification"
StartAt: ValidateFile

States:
  ValidateFile:
    Type: Task
    Next: CheckValidation

  CheckValidation:
    Type: Choice
    Choices:
      - Variable: "$.valid"
        BooleanEquals: true
        Next: TransformData
    Default: NotifyFailure

  TransformData:
    Type: Task
    Next: ProcessUpload

  ProcessUpload:
    Type: Task
    Next: NotifyComplete

  NotifyComplete:
    Type: Task
    Next: Done

  NotifyFailure:
    Type: Task
    Next: Failed

  Done:
    Type: Succeed

  Failed:
    Type: Fail
    Error: "ValidationFailed"
    Cause: "File validation failed"
