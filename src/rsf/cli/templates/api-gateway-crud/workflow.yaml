rsf_version: "1.0"
Comment: "API Gateway CRUD workflow — DynamoDB-backed REST API"
StartAt: RouteRequest

States:
  RouteRequest:
    Type: Choice
    Choices:
      - Variable: "$.httpMethod"
        StringEquals: "POST"
        Next: CreateItem
      - Variable: "$.httpMethod"
        StringEquals: "GET"
        Next: CheckSingleItem
      - Variable: "$.httpMethod"
        StringEquals: "PUT"
        Next: UpdateItem
      - Variable: "$.httpMethod"
        StringEquals: "DELETE"
        Next: DeleteItem
    Default: ListItems

  CheckSingleItem:
    Type: Choice
    Choices:
      - Variable: "$.pathParameters.id"
        IsPresent: true
        Next: GetItem
    Default: ListItems

  CreateItem:
    Type: Task
    Next: Done

  GetItem:
    Type: Task
    Next: Done

  UpdateItem:
    Type: Task
    Next: Done

  DeleteItem:
    Type: Task
    Next: Done

  ListItems:
    Type: Task
    Next: Done

  Done:
    Type: Succeed
